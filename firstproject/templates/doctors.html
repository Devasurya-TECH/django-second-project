<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0b1020;
            color:white;
            font-family:Poppins;
        }

        .doctor-card{
            background:#111827;
            border-radius:25px;
            overflow:hidden;
            transition:0.4s;
        }

        .doctor-card:hover{
            transform:translateY(-10px);
        }

        .doctor-card img{
            width:100%;
            height:350px;
            object-fit:cover;
        }

        .doctor-content{
            padding:25px;
            text-align:center;
        }

    </style>

</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Our Specialist Doctors</h1>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="doctor-card">

                <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?q=80&w=800&auto=format&fit=crop">

                <div class="doctor-content">

                    <h3>Dr. Arun Kumar</h3>

                    <p>Cardiologist</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="doctor-card">

                <img src="https://images.unsplash.com/photo-1594824476967-48c8b964273f?q=80&w=800&auto=format&fit=crop">

                <div class="doctor-content">

                    <h3>Dr. Neha Joseph</h3>

                    <p>Neurologist</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="doctor-card">

                <img src="https://images.unsplash.com/photo-1651008376811-b90baee60c1f?q=80&w=800&auto=format&fit=crop">

                <div class="doctor-content">

                    <h3>Dr. Rahul Menon</h3>

                    <p>Orthopedic Surgeon</p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
