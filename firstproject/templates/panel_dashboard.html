<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MediCare Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: #e2e8f0;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.2), transparent 25%),
                radial-gradient(circle at bottom right, rgba(14,165,233,0.14), transparent 22%),
                linear-gradient(160deg, #020617 0%, #0f172a 56%, #111827 100%);
        }
        .panel-shell { padding: 28px 0 48px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
        }
        .brand {
            font-size: 1.7rem;
            font-weight: 800;
            color: white;
        }
        .brand span { color: #38bdf8; }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }
        .btn-logout {
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            background: rgba(220, 38, 38, 0.95);
            color: white;
            font-weight: 700;
        }
        .stats-card, .panel-card {
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 24px;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(18px);
        }
        .stats-card { padding: 22px; height: 100%; }
        .stats-label { color: #94a3b8; font-size: 0.9rem; }
        .stats-value { color: white; font-size: 2rem; font-weight: 800; margin-top: 6px; }
        .panel-card { padding: 22px; }
        .panel-title {
            color: white;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .table-dark-custom {
            --bs-table-bg: transparent;
            --bs-table-color: #e2e8f0;
            --bs-table-border-color: rgba(255,255,255,0.08);
            margin-bottom: 0;
        }
        .table-dark-custom thead th { color: white; font-weight: 600; }
        .badge-soft {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .badge-active { background: rgba(34, 197, 94, 0.14); color: #86efac; }
        .badge-inactive { background: rgba(239, 68, 68, 0.14); color: #fca5a5; }
        .action-btn {
            border: 0;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            color: white;
        }
        .action-edit { background: linear-gradient(90deg, #2563eb, #0ea5e9); }
        .empty-state {
            color: #94a3b8;
            text-align: center;
            padding: 22px 0;
        }
        .muted-line { color: #94a3b8; }
        .form-control, .form-select {
            background: #0f172a;
            border-color: rgba(148, 163, 184, 0.2);
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background: #0f172a;
            color: #fff;
            border-color: #38bdf8;
            box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.14);
        }
        @media (max-width: 768px) {
            .topbar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container panel-shell">
        <div class="topbar">
            <div>
                <div class="brand">Medi<span>Care</span> Admin</div>
                <div class="muted-line">JWT protected staff panel for bookings and doctors.</div>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <div class="pill">
                    <strong id="staffName">Staff</strong>
                </div>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-label">Bookings</div>
                    <div class="stats-value" id="appointmentsCount">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-label">Doctors</div>
                    <div class="stats-value" id="doctorsCount">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card">
                    <div class="stats-label">Active Doctors</div>
                    <div class="stats-value" id="activeDoctorsCount">0</div>
                </div>
            </div>
        </div>

        <div id="errorBox" class="alert alert-danger d-none"></div>

        <div class="row g-4">
            <div class="col-12">
                <div class="panel-card">
                    <div class="panel-title">Recent Bookings</div>
                    <div class="table-responsive">
                        <table class="table table-dark-custom align-middle">
                            <thead>
                                <tr>
                                    <th>Patient</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Department</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="appointmentsBody"></tbody>
                        </table>
                    </div>
                    <div id="appointmentsEmpty" class="empty-state d-none">No bookings available.</div>
                </div>
            </div>

            <div class="col-12">
                <div class="panel-card">
                    <div class="panel-title">Doctors</div>
                    <div class="table-responsive">
                        <table class="table table-dark-custom align-middle">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Specialty</th>
                                    <th>Status</th>
                                    <th>Bio</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="doctorsBody"></tbody>
                        </table>
                    </div>
                    <div id="doctorsEmpty" class="empty-state d-none">No doctors available.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="appointmentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-light border border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Edit Booking</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="appointmentForm">
                    <div class="modal-body">
                        <input type="hidden" id="appointmentId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Patient Name</label>
                                <input class="form-control" id="appointment_patient_name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input class="form-control" id="appointment_email" type="email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input class="form-control" id="appointment_phone" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <input class="form-control" id="appointment_department" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date</label>
                                <input class="form-control" id="appointment_date" type="date" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Time</label>
                                <input class="form-control" id="appointment_time" type="time" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" id="appointment_message" rows="4"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="doctorModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-light border border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Edit Doctor</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="doctorForm" enctype="multipart/form-data">
                    <div class="modal-body">
                        <input type="hidden" id="doctorId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input class="form-control" id="doctor_name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Specialty</label>
                                <input class="form-control" id="doctor_specialty" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Image URL</label>
                                <input class="form-control" id="doctor_image_url">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Photo File</label>
                                <input class="form-control" id="doctor_image" type="file" accept="image/*">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Bio</label>
                                <textarea class="form-control" id="doctor_bio" rows="4"></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="doctor_is_active">
                                    <label class="form-check-label" for="doctor_is_active">Active</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const accessKey = 'adminAccessToken';
        const refreshKey = 'adminRefreshToken';
        const loginUrl = "{% url 'panel_login' %}";
        const dataUrl = "{% url 'panel_dashboard_api' %}";
        const tokenRefreshUrl = "{% url 'panel_token_refresh' %}";
        const appointmentBaseUrl = "{% url 'panel_appointment_detail' 0 %}".replace('/0/', '/');
        const doctorBaseUrl = "{% url 'panel_doctor_detail' 0 %}".replace('/0/', '/');

        const errorBox = document.getElementById('errorBox');
        const appointmentsBody = document.getElementById('appointmentsBody');
        const doctorsBody = document.getElementById('doctorsBody');
        const appointmentsEmpty = document.getElementById('appointmentsEmpty');
        const doctorsEmpty = document.getElementById('doctorsEmpty');
        const appointmentModal = new bootstrap.Modal(document.getElementById('appointmentModal'));
        const doctorModal = new bootstrap.Modal(document.getElementById('doctorModal'));
        let panelState = { appointments: [], doctors: [] };

        function redirectToLogin() {
            localStorage.removeItem(accessKey);
            localStorage.removeItem(refreshKey);
            window.location.href = loginUrl;
        }

        async function refreshAccessToken() {
            const refresh = localStorage.getItem(refreshKey);
            if (!refresh) {
                redirectToLogin();
                return null;
            }

            const response = await fetch(tokenRefreshUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh }),
            });

            if (!response.ok) {
                redirectToLogin();
                return null;
            }

            const payload = await response.json();
            localStorage.setItem(accessKey, payload.access);
            return payload.access;
        }

        async function authorizedFetch(url, options = {}, allowRetry = true) {
            const access = localStorage.getItem(accessKey);
            let response = await fetch(url, {
                ...options,
                headers: {
                    ...(options.headers || {}),
                    Authorization: `Bearer ${access}`,
                },
            });

            if (response.status === 401 && allowRetry) {
                const refreshed = await refreshAccessToken();
                if (!refreshed) return response;

                response = await fetch(url, {
                    ...options,
                    headers: {
                        ...(options.headers || {}),
                        Authorization: `Bearer ${refreshed}`,
                    },
                });
            }

            return response;
        }

        async function loadPanelData() {
            let access = localStorage.getItem(accessKey);
            if (!access) {
                redirectToLogin();
                return;
            }

            let response = await fetch(dataUrl, {
                headers: { Authorization: `Bearer ${access}` }
            });

            if (response.status === 401) {
                access = await refreshAccessToken();
                if (!access) return;
                response = await fetch(dataUrl, {
                    headers: { Authorization: `Bearer ${access}` }
                });
            }

            if (!response.ok) {
                errorBox.textContent = 'Unable to load panel data.';
                errorBox.classList.remove('d-none');
                return;
            }

            const payload = await response.json();
            panelState = {
                appointments: payload.appointments || [],
                doctors: payload.doctors || []
            };

            const stats = payload.stats || {};
            document.getElementById('appointmentsCount').textContent = stats.appointments ?? 0;
            document.getElementById('doctorsCount').textContent = stats.doctors ?? 0;
            document.getElementById('activeDoctorsCount').textContent = stats.active_doctors ?? 0;
            document.getElementById('staffName').textContent = payload.user_name || 'Staff';

            renderAppointments(panelState.appointments);
            renderDoctors(panelState.doctors);
        }

        function renderAppointments(rows) {
            appointmentsBody.innerHTML = '';
            appointmentsEmpty.classList.toggle('d-none', rows.length !== 0);

            rows.forEach((item) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.patient_name}</td>
                    <td>${item.email}</td>
                    <td>${item.phone}</td>
                    <td>${item.department}</td>
                    <td>${item.appointment_date}</td>
                    <td>${String(item.appointment_time || '').slice(0, 5)}</td>
                    <td><button class="action-btn action-edit" data-edit-appointment="${item.id}">Edit</button></td>
                `;
                appointmentsBody.appendChild(tr);
            });
        }

        function renderDoctors(rows) {
            doctorsBody.innerHTML = '';
            doctorsEmpty.classList.toggle('d-none', rows.length !== 0);

            rows.forEach((item) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.specialty}</td>
                    <td>
                        <span class="badge-soft ${item.is_active ? 'badge-active' : 'badge-inactive'}">
                            ${item.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>${item.bio || '-'}</td>
                    <td><button class="action-btn action-edit" data-edit-doctor="${item.id}">Edit</button></td>
                `;
                doctorsBody.appendChild(tr);
            });
        }

        function findAppointment(id) {
            return panelState.appointments.find((item) => String(item.id) === String(id));
        }

        function findDoctor(id) {
            return panelState.doctors.find((item) => String(item.id) === String(id));
        }

        appointmentsBody.addEventListener('click', (event) => {
            const button = event.target.closest('[data-edit-appointment]');
            if (!button) return;

            const item = findAppointment(button.dataset.editAppointment);
            if (!item) return;

            document.getElementById('appointmentId').value = item.id;
            document.getElementById('appointment_patient_name').value = item.patient_name || '';
            document.getElementById('appointment_email').value = item.email || '';
            document.getElementById('appointment_phone').value = item.phone || '';
            document.getElementById('appointment_department').value = item.department || '';
            document.getElementById('appointment_date').value = item.appointment_date || '';
            document.getElementById('appointment_time').value = String(item.appointment_time || '').slice(0, 5);
            document.getElementById('appointment_message').value = item.message || '';
            appointmentModal.show();
        });

        doctorsBody.addEventListener('click', (event) => {
            const button = event.target.closest('[data-edit-doctor]');
            if (!button) return;

            const item = findDoctor(button.dataset.editDoctor);
            if (!item) return;

            document.getElementById('doctorId').value = item.id;
            document.getElementById('doctor_name').value = item.name || '';
            document.getElementById('doctor_specialty').value = item.specialty || '';
            document.getElementById('doctor_image_url').value = item.image || '';
            document.getElementById('doctor_bio').value = item.bio || '';
            document.getElementById('doctor_is_active').checked = !!item.is_active;
            document.getElementById('doctor_image').value = '';
            doctorModal.show();
        });

        document.getElementById('appointmentForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const id = document.getElementById('appointmentId').value;
            const response = await authorizedFetch(`${appointmentBaseUrl}${id}/`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    patient_name: document.getElementById('appointment_patient_name').value,
                    email: document.getElementById('appointment_email').value,
                    phone: document.getElementById('appointment_phone').value,
                    department: document.getElementById('appointment_department').value,
                    appointment_date: document.getElementById('appointment_date').value,
                    appointment_time: document.getElementById('appointment_time').value,
                    message: document.getElementById('appointment_message').value,
                }),
            });

            if (!response.ok) {
                errorBox.textContent = 'Could not update the booking.';
                errorBox.classList.remove('d-none');
                return;
            }

            appointmentModal.hide();
            loadPanelData();
        });

        document.getElementById('doctorForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const id = document.getElementById('doctorId').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('doctor_name').value);
            formData.append('specialty', document.getElementById('doctor_specialty').value);
            formData.append('image_url', document.getElementById('doctor_image_url').value);
            formData.append('bio', document.getElementById('doctor_bio').value);
            formData.append('is_active', document.getElementById('doctor_is_active').checked ? 'true' : 'false');

            const fileInput = document.getElementById('doctor_image');
            if (fileInput.files && fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            const response = await authorizedFetch(`${doctorBaseUrl}${id}/`, {
                method: 'PATCH',
                body: formData,
            });

            if (!response.ok) {
                errorBox.textContent = 'Could not update the doctor.';
                errorBox.classList.remove('d-none');
                return;
            }

            doctorModal.hide();
            loadPanelData();
        });

        document.getElementById('logoutBtn').addEventListener('click', redirectToLogin);

        loadPanelData();
    </script>
</body>
</html>
