<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0b1020;
            color:white;
            font-family:Poppins;
        }

        .feature-card{
            background:#111827;
            border-radius:25px;
            padding:35px;
            text-align:center;
            transition:0.4s;
        }

        .feature-card:hover{
            transform:translateY(-10px);
            background:linear-gradient(to right,#8b5cf6,#22d3ee);
        }

        .feature-icon{
            font-size:55px;
            margin-bottom:20px;
        }

    </style>

</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Hospital Services</h1>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="feature-card">

                <div class="feature-icon">🏥</div>

                <h3>Emergency Care</h3>

                <p>24/7 emergency healthcare support.</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="feature-card">

                <div class="feature-icon">💊</div>

                <h3>Modern Pharmacy</h3>

                <p>All medicines available anytime.</p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="feature-card">

                <div class="feature-icon">🩺</div>

                <h3>Health Checkup</h3>

                <p>Advanced full body health packages.</p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
