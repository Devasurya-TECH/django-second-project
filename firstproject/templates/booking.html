<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#0b1020;
            color:white;
            font-family:Poppins;
        }

        .booking-box{
            background:#111827;
            padding:40px;
            border-radius:25px;
        }

    </style>

</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">Book Appointment</h1>

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="booking-box">

                <form>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <input type="text"
                            class="form-control"
                            placeholder="Full Name">

                        </div>

                        <div class="col-md-6 mb-3">

                            <input type="email"
                            class="form-control"
                            placeholder="Email">

                        </div>

                        <div class="col-md-6 mb-3">

                            <input type="date"
                            class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <input type="time"
                            class="form-control">

                        </div>

                        <div class="col-12 mb-3">

                            <textarea rows="4"
                            class="form-control"
                            placeholder="Symptoms"></textarea>

                        </div>

                        <div class="col-12">

                            <button class="btn btn-primary w-100">
                                Confirm Booking
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
